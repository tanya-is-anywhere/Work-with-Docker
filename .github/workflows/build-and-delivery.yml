name: Build and Delivery
on:
  workflow_run:
    workflows: ["Test Python App"]
    types: [completed]
    branches:
    - 'master'

jobs:
  cd:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2  # Добавлен для улучшенной сборки Docker

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile  # Явно указан Dockerfile (если он есть)
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
        BUILD_DATE: ${{ github.run_started_at }}

    - name: Print build details (debug)
      run: |
        echo "Docker image pushed with tag: ${{ steps.docker_build.outputs.digest }}"
        echo "Build completed at: ${{ github.run_started_at }}"
